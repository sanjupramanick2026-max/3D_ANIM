<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            /* background-color: black; */
        }

        .main {
            margin: 30% auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* border: 2px solid red; */
        }

        .face {
            background: rgba(rgb(194, 120, 120), 0.6);
            height: 150px;
            width: 150px;
            border: 2px solid red;
            position: absolute;
            /* animation: spin 3s linear infinite; */
        }

        .a {
            /* transform: translateZ(100px); */
        }

        .b {
            transform: translateY(50px) translateX(50px);
        }

         .c {
            width:  50px;
            margin-top: 50px;
            transform: translateX(100px) skewY(45deg);
        }

        .d {
             width:  50px;
            margin-top: 50px;
            transform: translateX(-50px) skewY(45deg);
        }

        .e {
             height:  50px;
            margin-left: 49px;
            transform: translateY(-54px) skewX(45deg);
        }

        .f {
           height:  50px;
            margin-left: 49px;
            transform: translateY(100px) skewX(45deg);
        } 
        @keyframes spin {
            from {
                transform: rotateX(0deg) rotateY(0deg);
            }

            to {
                transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="face a"></div>       
        <div class="face b"></div>
         <div class="face c"></div>        
        <div class="face d"></div>
         <div class="face e"></div>
        <div class="face f"></div>
    </div>
</body>

</html>
